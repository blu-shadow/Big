<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Setup | Gents Choice</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root { --primary: #e8491d; --dark: #0a0a0a; --card: #141414; --text: #ffffff; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
body { background: var(--dark); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .profile-setup-card { background: var(--card); width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .image-upload-section { text-align: center; margin-bottom: 25px; position: relative; }
    .image-preview { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--primary); margin: 0 auto 15px; overflow: hidden; background: #222; display: flex; align-items: center; justify-content: center; }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }
    
    .upload-label-btn { background: var(--primary); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: 0.3s; display: inline-block; }
    #fileInput { display: none; }

    .input-field { margin-bottom: 15px; }
    .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    input, textarea { width: 100%; padding: 12px 15px; background: #222; border: 1px solid #333; border-radius: 10px; color: white; outline: none; transition: 0.3s; font-size: 0.9rem; }
    input:focus, textarea:focus { border-color: var(--primary); }
    textarea { height: 80px; resize: none; }

    .create-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; }
    .create-btn:hover { background: #ff5e31; transform: translateY(-2px); }
    
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 25px; border-radius: 50px; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .admin-link { display: block; text-align: center; margin-top: 20px; font-size: 0.8rem; color: #666; text-decoration: none; cursor: pointer; }
</style>
</head>
<body>
<div class="profile-setup-card">
    <h2 style="text-align:center; margin-bottom: 20px; color: var(--primary);">Join Gents Choice</h2>
    
    <div class="image-upload-section">
        <div class="image-preview" id="imagePreview">
            <img id="previewImg" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Profile">
        </div>
        <label for="fileInput" class="upload-label-btn"><i class="fas fa-camera"></i> Change Photo</label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <form id="profile-setup-form">
        <div class="input-field">
            <input type="text" id="name" placeholder="Full Name" required>
        </div>
        <div class="input-field">
            <input type="text" id="username" placeholder="Username (Unique)">
        </div>
        <div class="input-field">
            <input type="email" id="email" placeholder="Email Address">
        </div>
        <div class="input-field">
            <input type="tel" id="phone" placeholder="Phone Number (Required)" required>
        </div>
        <!-- Birth Year and Age Grid -->
        <div class="grid-fields">
            <input type="number" id="birthYear" placeholder="Birth Year (e.g. 2000)">
            <input type="number" id="age" placeholder="Age">
        </div>
        <div class="input-field">
            <textarea id="address" placeholder="Full Delivery Address"></textarea>
        </div>

        <button type="submit" class="create-btn" id="submitBtn">
            <span id="btnText">CREATE PROFILE</span>
            <i id="btnLoader" class="fas fa-spinner fa-spin" style="display: none;"></i>
        </button>
    </form>

    <p class="admin-link" onclick="handleAdminLogin()">Admin Login?</p>
</div>

<div id="toast"></div>

<script src="login.js"></script>
<script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('previewImg').src = event.target.result;
            }
            reader.readAsDataURL(file);
        }
    });

    function handleAdminLogin() {
        const pass = prompt("Enter Admin Password:");
        if (pass === "admin123") {
            localStorage.setItem('adminAuth', 'true');
            showToast("✅ Admin access granted!");
            setTimeout(() => window.location.href = 'admin.html', 1000);
        } else if (pass !== null) {
            showToast("❌ Wrong password!");
        }
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
